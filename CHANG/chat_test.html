<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재무 에이전트 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --bg2:      #181c27;
    --bg3:      #1e2333;
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.14);
    --text:     #e2e4ec;
    --text2:    #8b90a0;
    --text3:    #555a6e;
    --accent:   #4f8ef7;
    --accent2:  #2a5ccf;
    --green:    #34d399;
    --amber:    #f59e0b;
    --red:      #f87171;
    --radius:   10px;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans KR', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-title { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }
  .header-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  .header-right { display: flex; align-items: center; gap: 8px; }

  /* 상태 패널 토글 버튼 */
  .btn-icon {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--border2); color: var(--text); }

  /* 초기화 버튼 */
  .btn-reset {
    background: transparent;
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { background: rgba(248,113,113,0.08); }

  /* ── 메인 레이아웃 ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 상태 패널 ── */
  .state-panel {
    width: 260px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s ease, opacity 0.2s ease;
    flex-shrink: 0;
  }
  .state-panel.hidden { width: 0; opacity: 0; pointer-events: none; }

  .panel-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-body { overflow-y: auto; padding: 12px; flex: 1; }

  .param-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 8px;
    border-radius: 6px;
    margin-bottom: 2px;
    transition: background 0.1s;
  }
  .param-item:hover { background: var(--bg3); }
  .param-key {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
  }
  .param-val {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    text-align: right;
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .param-val.null-val { color: var(--text3); }

  .panel-section {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.06em;
    padding: 10px 8px 4px;
    margin-top: 4px;
  }

  /* ── 채팅 영역 ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  .message-wrap {
    padding: 0 24px;
    margin-bottom: 20px;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-wrap.user { display: flex; justify-content: flex-end; }
  .message-wrap.agent { display: flex; justify-content: flex-start; gap: 10px; }

  /* 아바타 */
  .avatar {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-family: var(--mono);
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* 말풍선 */
  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .user .bubble {
    background: var(--accent2);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .agent .bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }

  /* 이미지 (그래프) */
  .bubble img {
    max-width: 100%;
    border-radius: 6px;
    margin-top: 10px;
    border: 1px solid var(--border);
    display: block;
  }

  /* 타이핑 인디케이터 */
  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
    animation: blink 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* 에러 메시지 */
  .error-bubble {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    color: var(--red);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: var(--radius);
    max-width: 72%;
    font-family: var(--mono);
  }

  /* ── 입력 영역 ── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: var(--accent2); }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text3); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 7px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: #6ba3f8; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--bg3); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
    font-family: var(--mono);
    text-align: right;
  }

  /* ── 빈 화면 ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }
  .empty-icon {
    font-size: 32px;
    opacity: 0.4;
    margin-bottom: 4px;
  }
  .empty-title { font-size: 15px; color: var(--text2); font-weight: 500; }
  .empty-sub { font-size: 13px; text-align: center; line-height: 1.6; max-width: 300px; }
  .example-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-top: 8px; max-width: 400px;
  }
  .chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent2); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <div>
      <div class="header-title">재무 에이전트</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="togglePanel()">파라미터 상태</button>
    <button class="btn-reset" onclick="resetAll()">대화 초기화</button>
  </div>
</header>

<div class="main">
  <!-- 상태 패널 -->
  <div class="state-panel" id="statePanel">
    <div class="panel-header">CURRENT_PARAMS</div>
    <div class="panel-body" id="paramList"></div>
  </div>

  <!-- 채팅 영역 -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◈</div>
        <div class="empty-title">재무 시뮬레이션 에이전트</div>
        <div class="empty-sub">창업 재무 분석 질문을 입력하세요.<br>이전 대화의 파라미터가 누적 반영됩니다.</div>
        <div class="example-chips">
          <div class="chip" onclick="fillInput('매출 700만원으로 시뮬레이션 해주세요')">매출 700만원으로 시뮬레이션</div>
          <div class="chip" onclick="fillInput('임대료 200만원이면 손실확률은?')">임대료 200만원이면?</div>
          <div class="chip" onclick="fillInput('초기투자 5000만원 회수 기간 알려줘')">투자 회수 기간</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="inputBox"
          placeholder="질문을 입력하세요..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter 전송 &nbsp;·&nbsp; Shift+Enter 줄바꿈</div>
    </div>
  </div>
</div>

<script>
// ── 설정 ─────────────────────────────────────────────────────────────────
const API_URL = 'http://localhost:8000/api/v1/query';  // ← 서버 주소 맞게 수정

// ── 기본 파라미터  ───────────────────────────────────────────────────────
const DEFAULT_PARAMS = {
    "revenue": [14000000],
    "cost": null,
    "salary": null,
    "hours": null,
    "rent": null,
    "admin": null,
    "fee": null,
    "initial_investment": null
};

// ── 상태 ─────────────────────────────────────────────────────────────────
let currentParams = loadParams();
let isLoading = false;
let panelVisible = true;

// localStorage 저장/불러오기
function loadParams() {
  try {
    const saved = localStorage.getItem('financeParams');
    return saved ? JSON.parse(saved) : { ...DEFAULT_PARAMS };
  } catch { return { ...DEFAULT_PARAMS }; }
}
function saveParams(params) {
  localStorage.setItem('financeParams', JSON.stringify(params));
}

// ── 파라미터 패널 렌더링 ─────────────────────────────────────────────────
function renderParams() {
  const list = document.getElementById('paramList');
  const fmt = (v) => {
    if (v === null || v === undefined) return { text: 'null', cls: 'null-val' };
    if (Array.isArray(v)) {
      const avg = Math.round(v.reduce((a,b)=>a+b,0)/v.length/10000);
      return { text: `[${v.length}개] avg ${avg.toLocaleString()}만`, cls: '' };
    }
    return { text: Math.round(v/10000).toLocaleString() + '만원', cls: '' };
  };

  const sections = {
    '매출': ['revenue'],
    '비용': ['cost', 'salary', 'hours', 'rent', 'admin', 'fee'],
    '기타': ['initial_investment'],
  };

  list.innerHTML = Object.entries(sections).map(([sec, keys]) => `
    <div class="panel-section">${sec}</div>
    ${keys.map(k => {
      const { text, cls } = fmt(currentParams[k]);
      return `<div class="param-item">
        <span class="param-key">${k}</span>
        <span class="param-val ${cls}" title="${JSON.stringify(currentParams[k])}">${text}</span>
      </div>`;
    }).join('')}
  `).join('');
}

// ── 패널 토글 ────────────────────────────────────────────────────────────
function togglePanel() {
  panelVisible = !panelVisible;
  document.getElementById('statePanel').classList.toggle('hidden', !panelVisible);
}

// ── 메시지 추가 ──────────────────────────────────────────────────────────
function addMessage(role, content, imageB64 = null) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const wrap = document.createElement('div');
  wrap.className = `message-wrap ${role}`;

  if (role === 'agent') {
    wrap.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">${escapeHtml(content)}${imageB64
        ? `<img src="data:image/png;base64,${imageB64}" alt="시뮬레이션 그래프">`
        : ''
      }</div>`;
  } else {
    wrap.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
  }

  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
  return wrap;
}

function addError(msg) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const wrap = document.createElement('div');
  wrap.className = 'message-wrap agent';
  wrap.innerHTML = `<div class="avatar">!</div><div class="error-bubble">${escapeHtml(msg)}</div>`;
  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
}

// 타이핑 인디케이터
function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'message-wrap agent';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `
    <div class="avatar">AI</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
}
function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── 메시지 전송 ──────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('inputBox');
  const question = input.value.trim();
  if (!question || isLoading) return;

  isLoading = true;
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', question);
  addTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        current_params: currentParams,
      }),
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.text();
      addError(`서버 오류 (${res.status}): ${err}`);
      return;
    }

    const data = await res.json();

    // 파라미터 업데이트 (서버가 updated_params 반환 시)
    if (data.updated_params) {
      currentParams = { ...currentParams, ...data.updated_params };
      saveParams(currentParams);
      renderParams();
    }

    // 답변 + 그래프 표시
    addMessage('agent', data.result || data.answer || JSON.stringify(data), data.chart || null);

  } catch (e) {
    removeTyping();
    addError(`연결 실패: ${e.message}\n\nAPI_URL을 확인해주세요: ${API_URL}`);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

// ── 대화 초기화 ──────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('대화와 파라미터를 모두 초기화할까요?')) return;
  currentParams = { ...DEFAULT_PARAMS };
  saveParams(currentParams);
  renderParams();

  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◈</div>
      <div class="empty-title">재무 시뮬레이션 에이전트</div>
      <div class="empty-sub">창업 재무 분석 질문을 입력하세요.<br>이전 대화의 파라미터가 누적 반영됩니다.</div>
      <div class="example-chips">
        <div class="chip" onclick="fillInput('매출 700만원으로 시뮬레이션 해주세요')">매출 700만원으로 시뮬레이션</div>
        <div class="chip" onclick="fillInput('임대료 200만원이면 손실확률은?')">임대료 200만원이면?</div>
        <div class="chip" onclick="fillInput('초기투자 5000만원 회수 기간 알려줘')">투자 회수 기간</div>
      </div>
    </div>`;
}

// ── 유틸 ─────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}
function fillInput(text) {
  const input = document.getElementById('inputBox');
  input.value = text;
  autoResize(input);
  input.focus();
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 초기화 ───────────────────────────────────────────────────────────────
renderParams();
document.getElementById('inputBox').focus();
</script>
</body>
</html>
