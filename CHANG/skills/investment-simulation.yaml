version: 1
name: investment-simulation
description: |
  창업 가능성을 Monte Carlo Simulation으로 평가하는 워크플로우.

stages:
  - id: input_to_json
    type: llm
    prompt: |
      사용자가 다음과 같은 질문을 했습니다:
      "{{user_input}}"

      이 질문을 기반으로 아래 변수들을 추정해 JSON으로 출력하세요.
      단, 숫자에 단위가 명시되지 않은 경우 기본적으로 '만원' 단위로 해석하세요.
      예: "매출 700" → 700만원 = 7,000,000원

      - revenue: 예상 월매출 데이터 리스트 (숫자 배열, 원 단위)
      - cost: 예상 월 원가 (숫자, 원 단위)
      - salary: 직원 급여 (숫자, 원 단위, 고정급 또는 시급)
      - hours: 월 근무시간 (시급일 경우만)
      - rent: 임대료 (원 단위)
      - admin: 관리비 (원 단위)
      - fee: 수수료 (원 단위)
      - tax_rate: 세율 (기본값 0.2)
      - initial_investment: 초기 투자비용 (원 단위)

      출력은 JSON 형식으로만 하세요.
    output: json_variables

  - id: run_simulation
    type: plugin
    skill: FinanceSimulationSkill
    function: monte_carlo_simulation
    input: "{{json_variables}}"
    output: simulation_result

  - id: explain_result
    type: llm
    prompt: |
      다음은 재무 시뮬레이션 결과입니다:
      - Average net profit: {{simulation_result.average_net_profit}}
      - Loss probability: {{simulation_result.loss_probability}}

      이 결과를 바탕으로 사업 가능성을 설명하세요.
      - 숫자는 원화 단위로 표현하세요.
      - 위험 요인과 기회 요인을 함께 언급하세요.
      - 경영자가 이해하기 쉽게 자연어로 작성하세요.
    output: final_explanation

  - id: explain_recovery
    type: llm
    prompt: |
      초기 투자비용 회수 결과:
      - 회수 가능 여부: {{recovery_result.recoverable}}
      - 예상 소요 기간: {{recovery_result.months}}개월

      위 결과를 바탕으로 투자 회수 가능성을 짧게 자연어로 설명하세요.
      예: "투자 회수까지 약 n개월이 소요됩니다." 또는 "n년 n개월 뒤에 투자금을 상환할 수 있습니다."
    output: recovery_explanation